<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Izin Keluar Staff</title>
  <style>
    :root { --primary: #2563eb; --success: #10b981; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --border: #e2e8f0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
    .container { max-width: 480px; margin: 0 auto; }
    .card { background: var(--card); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h2 { margin: 0 0 20px; text-align: center; color: #0f172a; }
    .info { background: #eff6ff; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; border-left: 4px solid var(--primary); }
    .date-display { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; padding: 10px; background: #f8fafc; border-radius: 8px; text-align: center; }
    .time-display { font-size: 36px; font-weight: 700; color: var(--primary); font-family: 'Courier New', monospace; margin-bottom: 20px; padding: 15px; background: #eff6ff; border-radius: 8px; text-align: center; letter-spacing: 3px; }
    .btn-group { display: flex; flex-direction: column; gap: 12px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; transition: 0.2s; color: white; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { background: #cbd5e1 !important; color: #64748b; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-keluar { background: var(--primary); }
    .btn-masuk { background: var(--success); }
    .btn-dashboard { background: #475569; margin-top: 0; } /* Tombol Dashboard Warna Abu-abu */
    .hidden { display: none; }
    .success { color: var(--success); background: #f0fdf4; padding: 12px; border-radius: 6px; margin-top: 15px; text-align: center; font-weight: 500; }
    .error { color: #dc2626; background: #fef2f2; padding: 12px; border-radius: 6px; margin-top: 15px; text-align: center; }
    .logout-btn { background: #94a3b8; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- LAYAR LOGIN -->
    <div id="loginScreen" class="card">
      <h2>🔐 Login Staff</h2>
      <form id="loginForm">
        <div style="margin-bottom: 16px;">
          <input type="text" id="loginUser" required autocomplete="username" placeholder="Username" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        </div>
        <div style="margin-bottom: 16px;">
          <input type="password" id="loginPass" required autocomplete="current-password" placeholder="Password" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; box-sizing: border-box;">
        </div>
        <button type="submit" id="btnLogin">Masuk</button>
        <div id="loginMsg"></div>
      </form>
    </div>

    <!-- LAYAR APLIKASI (MUNCUL SETELAH LOGIN) -->
    <div id="appScreen" class="card hidden">
      <div class="info">👤 <span id="displayName"></span> | 🏷️ <span id="displayJabatan"></span></div>
      <h2>📝 Izin Keluar</h2>
      
      <div class="date-display" id="dateDisplay">--</div>
      <div class="time-display" id="timeDisplay">00:00:00</div>
      
      <div class="btn-group">
        <button type="button" id="btnIzinKeluar" class="btn-keluar">✅ Izin Keluar</button>
        <button type="button" id="btnMasukKembali" class="btn-masuk">🔄 Masuk Kembali</button>
        
        <!-- 🟢 TOMBOL DASHBOARD PINDAH KE SINI -->
        <button type="button" class="btn-dashboard" onclick="window.open('https://elaborate-mooncake-02dd87.netlify.app/', '_blank')">📊 Dashboard Izin Keluar</button>
      </div>
      
      <div id="submitMsg"></div>
      
      <button id="btnLogout" class="logout-btn">Keluar / Ganti Akun</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyp_76RW61o2bOImLYvL6NP8HporbcpzZMGPhMgTCF4wGfM7SaRn2jU15EunZAU8vDd/exec';

    const loginScreen = document.getElementById('loginScreen');
    const appScreen = document.getElementById('appScreen');
    const loginForm = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const btnIzinKeluar = document.getElementById('btnIzinKeluar');
    const btnMasukKembali = document.getElementById('btnMasukKembali');
    const msg = document.getElementById('submitMsg');

    // 🔄 STATE MANAGEMENT
    let isOnLeave = JSON.parse(localStorage.getItem('isOnLeave') || 'false');

    function updateButtonStates() {
      if (isOnLeave) {
        btnIzinKeluar.disabled = true; btnIzinKeluar.textContent = '⏳ Sedang Izin...';
        btnMasukKembali.disabled = false;
      } else {
        btnIzinKeluar.disabled = false; btnIzinKeluar.textContent = '✅ Izin Keluar';
        btnMasukKembali.disabled = true;
      }
    }
    updateButtonStates();

    function formatTime(d) { return [d.getHours(), d.getMinutes(), d.getSeconds()].map(v => String(v).padStart(2, '0')).join(':'); }
    function updateDateTime() {
      const now = new Date();
      document.getElementById('dateDisplay').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('timeDisplay').textContent = formatTime(now);
    }
    setInterval(updateDateTime, 1000); updateDateTime();

    const userSession = JSON.parse(localStorage.getItem('izinStaffSession') || 'null');
    if (userSession) showApp(userSession);

    // HANDLE LOGIN
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('loginUser').value.trim();
      const password = document.getElementById('loginPass').value;
      const loginMsg = document.getElementById('loginMsg');

      btnLogin.disabled = true; btnLogin.textContent = 'Memverifikasi...'; loginMsg.innerHTML = '';

      try {
        const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'text/plain;charset=UTF-8'}, body: JSON.stringify({ action: 'login', username, password }) });
        const data = await res.json();
        if (data.success) {
          const session = { username, nama: data.nama, jabatan: data.jabatan };
          localStorage.setItem('izinStaffSession', JSON.stringify(session));
          showApp(session);
        } else loginMsg.innerHTML = `<div class="error">❌ ${data.message || 'Username/password salah'}</div>`;
      } catch (err) { loginMsg.innerHTML = `<div class="error">❌ Gagal terhubung: ${err.message}</div>`; }
      finally { btnLogin.disabled = false; btnLogin.textContent = 'Masuk'; }
    });

    // HANDLE IZIN KELUAR
    btnIzinKeluar.addEventListener('click', async () => {
      const session = JSON.parse(localStorage.getItem('izinStaffSession'));
      btnIzinKeluar.disabled = true; btnIzinKeluar.textContent = 'Mencatat...'; msg.innerHTML = '';
      try {
        const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'text/plain;charset=UTF-8'}, body: JSON.stringify({ action: 'keluar', username: session.username, nama: session.nama, jabatan: session.jabatan }) });
        const data = await res.json();
        if (data.success) {
          isOnLeave = true; localStorage.setItem('isOnLeave', 'true'); updateButtonStates();
          msg.innerHTML = `<div class="success">✅ ${data.message}<br>Jam: ${formatTime(new Date())}</div>`;
        } else msg.innerHTML = `<div class="error">❌ ${data.message}</div>`;
      } catch (err) { msg.innerHTML = `<div class="error">❌ Gagal terhubung</div>`; }
      finally { btnIzinKeluar.textContent = '✅ Izin Keluar'; if (!isOnLeave) btnIzinKeluar.disabled = false; }
    });

    // HANDLE MASUK KEMBALI
    btnMasukKembali.addEventListener('click', async () => {
      const session = JSON.parse(localStorage.getItem('izinStaffSession'));
      btnMasukKembali.disabled = true; btnMasukKembali.textContent = 'Mencatat...'; msg.innerHTML = '';
      try {
        const res = await fetch(API_URL, { method: 'POST', headers: {'Content-Type': 'text/plain;charset=UTF-8'}, body: JSON.stringify({ action: 'masuk', username: session.username, nama: session.nama }) });
        const data = await res.json();
        if (data.success) {
          isOnLeave = false; localStorage.setItem('isOnLeave', 'false'); updateButtonStates();
          msg.innerHTML = `<div class="success">✅ ${data.message}<br>Jam: ${formatTime(new Date())}</div>`;
        } else msg.innerHTML = `<div class="error">❌ ${data.message}</div>`;
      } catch (err) { msg.innerHTML = `<div class="error">❌ Gagal terhubung</div>`; }
      finally { btnMasukKembali.textContent = '🔄 Masuk Kembali'; if (isOnLeave) btnMasukKembali.disabled = false; }
    });

    document.getElementById('btnLogout').addEventListener('click', () => {
      localStorage.removeItem('izinStaffSession'); localStorage.removeItem('isOnLeave'); location.reload();
    });

    function showApp(session) {
      loginScreen.classList.add('hidden'); appScreen.classList.remove('hidden');
      document.getElementById('displayName').textContent = session.nama;
      document.getElementById('displayJabatan').textContent = session.jabatan;
      updateDateTime(); updateButtonStates();
    }
  </script>
</body>
</html>
